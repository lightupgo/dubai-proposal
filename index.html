<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Dubai Proposal">
  <title>Dubai Proposal</title>
  <style>
    :root { color-scheme:light; --sand:#f5efe3; --ink:#17342f; --gold:#c99a43; --muted:#68766f; }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; padding:24px; color:var(--ink); background:linear-gradient(145deg,#fffdf8,var(--sand)); font-family:Inter,system-ui,sans-serif; }
    main { width:min(900px,100%); }
    .label { margin-bottom:24px; color:var(--gold); font-size:12px; letter-spacing:.22em; text-transform:uppercase; }
    h1 { max-width:760px; margin:0; font-size:clamp(58px,11vw,128px); font-weight:400; line-height:.9; letter-spacing:-.07em; }
    p { max-width:560px; margin:34px 0 0; color:var(--muted); font-size:18px; line-height:1.7; }
  </style>
</head>
<body>
  <main>
    <div class="label">Light Up · New project</div>
    <h1>Dubai<br>Proposal</h1>
    <p>A new proposal website is being prepared. Content, imagery and presentation details will be developed here.</p>
  </main>
</body>
</html>
